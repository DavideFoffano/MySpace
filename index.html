<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#121212"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="MySpace"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>MySpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    #splash{
      position:fixed;inset:0;
      background:#121212;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:9999;
      transition:opacity .25s ease;
    }
    #splash.hide{opacity:0;pointer-events:none;}
    #splash-logo{
      font-family:'Jost',sans-serif;
      font-weight:500;font-size:22px;
      letter-spacing:.2em;text-transform:uppercase;
      color:#e8e6df;
    }
    #splash-logo span{color:#d4943a;}
    #splash-dot{
      margin-top:32px;
      width:6px;height:6px;border-radius:50%;
      background:#d4943a;opacity:.5;
      animation:splashpulse 1.2s ease-in-out infinite;
    }
    @keyframes splashpulse{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:.8;transform:scale(1.2);}}
  </style>
</head>
<body>
<div id="splash">
  <div id="splash-logo">My<span>Space</span></div>
  <div id="splash-dot"></div>
</div>
<div id="root"></div>
<script type="text/babel" src="core.js"></script>
<script type="text/babel" src="module-workout.js"></script>
<script type="text/babel" src="module-todo.js"></script>
<script type="text/babel" src="module-expenses.js"></script>
<script type="text/babel" src="module-notes.js"></script>
<script type="text/babel" src="app.js"></script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
  }
</script>
</body>
</html>
